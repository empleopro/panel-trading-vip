<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta VIP - SMC Quant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0e14; color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-box { background-color: #0d1117; padding: 2.5rem; border: 1px solid #30363d; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .form-control { background-color: #0a0e14; border: 1px solid #30363d; color: #c9d1d9; padding: 0.8rem; }
        .form-control:focus { background-color: #0a0e14; border-color: #58a6ff; color: white; box-shadow: none; }
        .btn-login { background-color: #3fb950; color: white; width: 100%; font-weight: bold; border: none; padding: 0.8rem; border-radius: 6px; margin-top: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:hover { background-color: #2ea043; }
        .error-box { background-color: rgba(248,81,73,0.1); color: #f85149; border: 1px solid rgba(248,81,73,0.4); padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-size: 0.9rem; }
        .link-muted { color: #8b949e; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; display: block; text-align: center; margin-top: 20px;}
        .link-muted:hover { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3 class="text-center mb-1" style="color: #58a6ff; font-weight: bold;">SMC QUANT</h3>
        <p class="text-center text-muted mb-3" style="font-size: 0.85rem;">Creá tu cuenta y obtené 15 días gratis</p>
        
        {% if error %}
        <div class="error-box">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="text-muted small mb-1 fw-bold">NUEVO USUARIO</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: trader123" autocomplete="off" required>
            </div>
            <div class="mb-4">
                <label class="text-muted small mb-1 fw-bold">CREAR CONTRASEÑA</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-rocket me-2"></i> Activar Prueba VIP</button>
        </form>
        
        <a href="{% url 'login' %}" class="link-muted border-top border-secondary pt-3">¿Ya tenés una cuenta? Iniciar Sesión</a>
    </div>
</body>
</html>
